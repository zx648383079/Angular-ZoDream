@if (visible()) {
<div class="dialog-mask"></div>
<div class="dialog-box">
    @for (item of items(); track $index) {
    <div class="line-item" [class.active]="item.id == selected()" (click)="selected.set(item.id!)">
        {{ item.name }}
    </div>
    }
    <div class="btn-group">
        <a class="btn btn-primary" (click)="close(true)" i18n>Confirm</a>
        <a class="btn btn-secondary" (click)="close()" i18n>Cancel</a>
    </div>
</div>
}
