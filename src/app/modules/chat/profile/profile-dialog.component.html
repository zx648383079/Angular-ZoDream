@if (visible()) {
<div class="dialog-mask" (click)="close()"></div>
<div class="dialog-box">
    @if (data) {
    <div class="user-box">
        <div class="avatar">
            <img [src]="data.avatar" alt="">
        </div>
        <div class="name">{{ data.name }}</div>
        <div class="brief">
            <p>.....</p>
        </div>
    </div>
    }
    
    @if (mode == 2) {
    <div class="form-group">
        <label for="user-name" i18n>Edit Remark</label>
        <input type="text" class="form-control" id="user-name" [(value)]="remark" i18n-placeholder placeholder="Remark">
    </div>
    } @else if (mode == 1) {
    <div class="form-group">
        <label for="apply-remark" i18n>Reason for application</label>
        <textarea class="form-control" id="apply-remark" [(value)]="remark" i18n-placeholder placeholder="Reason for application"></textarea>
    </div>
    }

    @if (mode > 0) {
        <div class="btn-group">
            @if (mode == 2) {
                <a class="btn btn-primary" (click)="close(true)" i18n>Confirm</a>
            } @else {
                <a class="btn btn-primary" (click)="close(true)" i18n>Add Friend</a>
            }
            <a class="btn btn-secondary" (click)="close()" i18n>Cancel</a>
        </div>
    }
</div>
}
